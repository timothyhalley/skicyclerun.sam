AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  skicyclerunAPI: function library
Globals:
  Function:
    Timeout: 3
    Runtime: nodejs22.x
    MemorySize: 3008
    Environment:
      Variables:
        ALLOWED_ORIGINS: { Ref: AllowedOrigins }

Parameters:
  UserPoolArn:
    Type: String
    Description: ARN of the Cognito User Pool for authorizing protected routes
  UserPoolClientId:
    Type: String
    Description: Cognito User Pool App Client ID for USER_AUTH passwordless flow
  AllowedOrigins:
    Type: String
    Default: "https://skicyclerun.com,https://dev.skicyclerun.com,http://localhost:4321,https://localhost:4321"
    Description: Comma-separated list of allowed origins for CORS
  ProtectedContentBucket:
    Type: String
    Description: S3 bucket name that stores protected post bodies

Resources:
  # CloudFront Function for URI rewriting (pretty URLs)
  UriRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-uri-rewrite"
      AutoPublish: true
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          // Skip if already requesting a file with extension
          if (uri.includes('.')) {
            return request;
          }

          // Add index.html to directory requests
          if (uri.endsWith('/')) {
            request.uri += 'index.html';
          } else {
            // Add trailing slash and index.html for pretty URLs
            request.uri += '/index.html';
          }

          return request;
        }
      FunctionConfig:
        Comment: "Rewrite pretty URLs to index.html for skicyclerun.com"
        Runtime: cloudfront-js-2.0

  PublicApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Auth:
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: { Ref: UserPoolArn }
            Identity:
              Header: Authorization

  EchoEchoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: EchoEcho/
      Handler: app.lambdaHandler
      # No explicit policies needed; SAM will create a basic execution role
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /echoecho
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /echoecho
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  WelcomeMsgFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WelcomeMsg/
      Handler: app.lambdaHandler
      # No explicit policies needed; SAM will create a basic execution role
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /welcome
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /welcome
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  RandomFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: RandomNumber/
      Handler: app.lambdaHandler
      # No explicit policies needed; SAM will create a basic execution role
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /random
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /random
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  GetBucketKeyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: getBucketkey/
      Handler: app.lambdaHandler
      Policies:
        - S3ReadPolicy:
            BucketName: { Ref: ProtectedContentBucket }
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /getkey
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /getkey
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  GetAlbumsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: getAlbums/
      Handler: app.lambdaHandler
      Policies:
        - S3ReadPolicy:
            BucketName: { Ref: ProtectedContentBucket }
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /getalbums
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /getalbums
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  GetAlbumPhotosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: getPhotos/
      Handler: app.lambdaHandler
      Policies:
        - S3ReadPolicy:
            BucketName: { Ref: ProtectedContentBucket }
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /getphotos
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /getphotos
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  GetAlbumPhotosRNDFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: getPhotosRandom/
      Handler: app.lambdaHandler
      Policies:
        - S3ReadPolicy:
            BucketName: { Ref: ProtectedContentBucket }
      Events:
        Welcome:
          Type: Api
          Properties:
            Path: /getphotosrandom
            Method: get
            RestApiId: { Ref: PublicApi }
        WelcomeOptions:
          Type: Api
          Properties:
            Path: /getphotosrandom
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 3008
      Timeout: 30

  StatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: Status/
      Handler: app.lambdaHandler
      Environment:
        Variables:
          ALLOWED_ORIGINS: { Ref: AllowedOrigins }
      Events:
        Status:
          Type: Api
          Properties:
            Path: /status
            Method: get
            RestApiId: { Ref: PublicApi }
        StatusOptions:
          Type: Api
          Properties:
            Path: /status
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 512
      Timeout: 10

  ProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: Profile/
      Handler: app.lambdaHandler
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
              Resource: { Ref: UserPoolArn }
      Environment:
        Variables:
          ALLOWED_ORIGINS: { Ref: AllowedOrigins }
          USER_POOL_ID: "us-west-2_nkPiRBTSr"
      Events:
        Profile:
          Type: Api
          Properties:
            Path: /profile
            Method: get
            RestApiId: { Ref: PublicApi }
            Auth:
              Authorizer: CognitoAuthorizer
        ProfileOptions:
          Type: Api
          Properties:
            Path: /profile
            Method: options
            RestApiId: { Ref: PublicApi }
      MemorySize: 512
      Timeout: 10

  # Cognito-native passwordless auth handler
  NotifyAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      CodeUri: notify-auth/
      Handler: handler.handler
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          USER_POOL_CLIENT_ID: { Ref: UserPoolClientId }
          NOTIFY_CONFIGURATION_ID: notify-96a1d17ccf3c4a408504252774c9ff6e
          NOTIFY_TEMPLATE_ID: notify-code-verification-english-001
          FROM_EMAIL: "noreply@skicyclerun.com"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:InitiateAuth
                - cognito-idp:RespondToAuthChallenge
              Resource: { Ref: UserPoolArn }
            - Effect: Allow
              Action:
                - sms-voice:SendTextMessage
                - sms-voice:SendNotifyTextMessage
                - sms-voice:DescribeNotifyConfigurations
                - sms-voice:DescribeNotifyTemplates
              Resource: "*"
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        SendOtp:
          Type: Api
          Properties:
            Path: /v2/auth/send-otp
            Method: post
            RestApiId: { Ref: PublicApi }
        VerifyOtp:
          Type: Api
          Properties:
            Path: /v2/auth/verify-otp
            Method: post
            RestApiId: { Ref: PublicApi }
        VerifyOtpOptions:
          Type: Api
          Properties:
            Path: /v2/auth/verify-otp
            Method: options
            RestApiId: { Ref: PublicApi }

  SendOtpPreflightFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      CodeUri: preflight-send-otp/
      Handler: app.lambdaHandler
      MemorySize: 128
      Timeout: 5
      Events:
        SendOtpOptions:
          Type: Api
          Properties:
            Path: /v2/auth/send-otp
            Method: options
            RestApiId: { Ref: PublicApi }

Outputs:
  PublicApiBaseUrl:
    Description: Base URL for the public API
    Value:
      Fn::Sub: "https://${PublicApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
    Export:
      Name: !Sub "${AWS::StackName}-PublicApiBaseUrl"

  UriRewriteFunctionArn:
    Description: ARN of the CloudFront URI rewrite function
    Value: !GetAtt UriRewriteFunction.FunctionMetadata.FunctionARN
    Export:
      Name: !Sub "${AWS::StackName}-UriRewriteFunctionArn"
